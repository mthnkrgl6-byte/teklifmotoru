version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: plumbing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/seed_products.sql:/docker-entrypoint-initdb.d/seed_products.sql

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/plumbing
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TESSERACT_CMD: /usr/bin/tesseract
    depends_on:
      - db
    ports:
      - '8000:8000'

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - '5173:5173'

volumes:
  postgres_data:
